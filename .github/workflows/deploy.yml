name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy search-worker.js --name fajna-clinic-rag

      - name: Set OpenAI Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: secret put OPENAI_API_KEY --name fajna-clinic-rag
        env:
          CLOUDFLARE_SECRET_VALUE: ${{ secrets.OPENAI_API_KEY }}

      - name: Set Pinecone Key
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: secret put PINECONE_API_KEY --name fajna-clinic-rag
        env:
          CLOUDFLARE_SECRET_VALUE: ${{ secrets.PINECONE_API_KEY }}

      - name: Set Pinecone Host
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: secret put PINECONE_HOST --name fajna-clinic-rag
        env:
          CLOUDFLARE_SECRET_VALUE: ${{ secrets.PINECONE_HOST }}

      - name: Set Google Log URL
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: secret put GOOGLE_SCRIPT_LOG_URL --name fajna-clinic-rag
        env:
          CLOUDFLARE_SECRET_VALUE: ${{ secrets.GOOGLE_SCRIPT_LOG_URL }}
